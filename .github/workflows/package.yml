name: Package

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]
    tags:
      - 'v*.*.*'
      - 'Nodely.Avalonia.Database/v*.*.*'
  workflow_dispatch:
    inputs:
      package:
        description: 'Package set'
        required: true
        default: 'all'
        type: choice
        options:
          - 'all'
          - 'main'
          - 'Nodely.Avalonia.Database'
      publish:
        description: 'Publish packages'
        required: true
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

permissions:
  contents: read

jobs:
  pack:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Restore
        run: dotnet restore Nodely.slnx

      - name: Build
        run: dotnet build Nodely.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test Nodely.slnx --configuration Release --no-build --verbosity normal

      - name: Determine package projects
        id: package-projects
        shell: bash
        run: |
          main_projects=(
            "src/Nodely.Core/Nodely.Core.csproj"
            "src/Nodely.Avalonia/Nodely.Avalonia.csproj"
            "src/Nodely.Algorithms/Nodely.Algorithms.csproj"
            "src/Nodely.Serialization/Nodely.Serialization.csproj"
          )
          database_projects=("src/Nodely.Avalonia.Database/Nodely.Avalonia.Database.csproj")

          package_input="${{ github.event.inputs.package }}"
          if [[ -z "$package_input" ]]; then
            package_input="all"
          fi

          projects=()
          if [[ "$GITHUB_REF" == refs/tags/Nodely.Avalonia.Database/v* ]]; then
            projects=("${database_projects[@]}")
          elif [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            projects=("${main_projects[@]}")
          elif [[ "$package_input" == "main" ]]; then
            projects=("${main_projects[@]}")
          elif [[ "$package_input" == "Nodely.Avalonia.Database" ]]; then
            projects=("${database_projects[@]}")
          else
            projects=("${main_projects[@]}" "${database_projects[@]}")
          fi

          {
            echo "projects<<EOF"
            printf '%s\n' "${projects[@]}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Pack
        shell: bash
        run: |
          while IFS= read -r project; do
            if [[ -n "$project" ]]; then
              dotnet pack "$project" --configuration Release --no-build --output artifacts/packages
            fi
          done <<< "${{ steps.package-projects.outputs.projects }}"

      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: packages
          path: |
            artifacts/packages/*.nupkg
            artifacts/packages/*.snupkg
          if-no-files-found: error

  publish:
    needs: pack
    if: startsWith(github.ref, 'refs/tags/v') || startsWith(github.ref, 'refs/tags/Nodely.Avalonia.Database/v') || (github.event_name == 'workflow_dispatch' && inputs.publish == 'true')
    runs-on: ubuntu-latest
    environment: package-publish
    steps:
      - name: Download packages
        uses: actions/download-artifact@v4
        with:
          name: packages
          path: artifacts/packages

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Publish packages and symbols
        run: dotnet nuget push "artifacts/packages/*.nupkg" --api-key "${{ secrets.NUGET_API_KEY }}" --source "https://api.nuget.org/v3/index.json" --skip-duplicate
