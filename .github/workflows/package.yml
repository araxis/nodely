name: Package

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]
    tags:
      - 'v*.*.*'
      - 'Nodely.Avalonia.*/v*.*.*'
  workflow_dispatch:
    inputs:
      package:
        description: 'Package set'
        required: true
        default: 'all'
        type: choice
        options:
          - 'all'
          - 'main'
          - 'Nodely.Avalonia.Database'
          - 'Nodely.Avalonia.MindMap'
          - 'Nodely.Avalonia.StateMachine'
          - 'Nodely.Avalonia.Uml'
          - 'Nodely.Avalonia.Workflow'
      publish:
        description: 'Publish packages'
        required: true
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

permissions:
  contents: read

jobs:
  pack:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Restore
        run: dotnet restore Nodely.slnx

      - name: Build
        run: dotnet build Nodely.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test Nodely.slnx --configuration Release --no-build --verbosity normal

      - name: Determine package projects
        id: package-projects
        shell: bash
        run: |
          main_projects=(
            "src/Nodely.Core/Nodely.Core.csproj"
            "src/Nodely.Avalonia/Nodely.Avalonia.csproj"
            "src/Nodely.Algorithms/Nodely.Algorithms.csproj"
            "src/Nodely.Serialization/Nodely.Serialization.csproj"
          )
          side_package_ids=(
            "Nodely.Avalonia.Database"
            "Nodely.Avalonia.MindMap"
            "Nodely.Avalonia.StateMachine"
            "Nodely.Avalonia.Uml"
            "Nodely.Avalonia.Workflow"
          )
          side_package_projects=(
            "src/Nodely.Avalonia.Database/Nodely.Avalonia.Database.csproj"
            "src/Nodely.Avalonia.MindMap/Nodely.Avalonia.MindMap.csproj"
            "src/Nodely.Avalonia.StateMachine/Nodely.Avalonia.StateMachine.csproj"
            "src/Nodely.Avalonia.Uml/Nodely.Avalonia.Uml.csproj"
            "src/Nodely.Avalonia.Workflow/Nodely.Avalonia.Workflow.csproj"
          )

          add_side_package() {
            local package_id="$1"
            for i in "${!side_package_ids[@]}"; do
              if [[ "${side_package_ids[$i]}" == "$package_id" ]]; then
                projects+=("${side_package_projects[$i]}")
                return 0
              fi
            done

            echo "Unknown package set: $package_id" >&2
            exit 1
          }

          add_all_side_packages() {
            for project in "${side_package_projects[@]}"; do
              projects+=("$project")
            done
          }

          package_input="${{ github.event.inputs.package }}"
          if [[ -z "$package_input" ]]; then
            package_input="all"
          fi

          projects=()
          if [[ "$GITHUB_REF" == refs/tags/Nodely.Avalonia.*/v* ]]; then
            package_from_tag="${GITHUB_REF#refs/tags/}"
            package_from_tag="${package_from_tag%/v*}"
            add_side_package "$package_from_tag"
          elif [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            projects=("${main_projects[@]}")
          elif [[ "$package_input" == "main" ]]; then
            projects=("${main_projects[@]}")
          elif [[ "$package_input" == Nodely.Avalonia.* ]]; then
            add_side_package "$package_input"
          else
            projects=("${main_projects[@]}")
            add_all_side_packages
          fi

          {
            echo "projects<<EOF"
            printf '%s\n' "${projects[@]}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Pack
        shell: bash
        run: |
          while IFS= read -r project; do
            if [[ -n "$project" ]]; then
              dotnet pack "$project" --configuration Release --no-build --output artifacts/packages
            fi
          done <<< "${{ steps.package-projects.outputs.projects }}"

      - name: Upload packages
        uses: actions/upload-artifact@v7
        with:
          name: packages
          path: |
            artifacts/packages/*.nupkg
            artifacts/packages/*.snupkg
          if-no-files-found: error

  publish:
    needs: pack
    if: startsWith(github.ref, 'refs/tags/v') || startsWith(github.ref, 'refs/tags/Nodely.Avalonia.') || (github.event_name == 'workflow_dispatch' && inputs.publish == 'true')
    runs-on: ubuntu-latest
    environment: package-publish
    steps:
      - name: Download packages
        uses: actions/download-artifact@v8
        with:
          name: packages
          path: artifacts/packages

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Publish packages and symbols
        run: dotnet nuget push "artifacts/packages/*.nupkg" --api-key "${{ secrets.NUGET_API_KEY }}" --source "https://api.nuget.org/v3/index.json" --skip-duplicate
